name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:3002

  backend:
    name: Backend — smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: mydatabase
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin -d mydatabase"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      PORT: 3002
      DB_USER: admin
      DB_PASSWORD: secret
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: mydatabase
      DB_SSL: "false"
      JWT_SECRET: ci-test-secret
      DOCS_PASSWORD: ci-docs
      ALLOWED_ORIGINS: http://localhost:5173
      OPENAI_API_KEY: sk-ci-fake
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Apply schema
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=secret psql -h localhost -U admin -d mydatabase -f data/init.sql
      - name: Smoke start & hit /health
        run: |
          node index.js &
          SERVER_PID=$!
          for i in {1..15}; do
            if curl -sf http://localhost:3002/health > /dev/null; then
              echo "ok"
              kill $SERVER_PID
              exit 0
            fi
            sleep 1
          done
          echo "backend no respondió"
          kill $SERVER_PID 2>/dev/null || true
          exit 1
